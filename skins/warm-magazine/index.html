<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">消息推送</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #f6f2e8;
      --bg-b: #d7ecf2;
      --ink: #1c2d36;
      --subtle: #4f6572;
      --card: rgba(255, 255, 255, 0.8);
      --line: rgba(28, 45, 54, 0.14);
      --accent: #d97745;
      --accent-soft: rgba(217, 119, 69, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 12% 10%, rgba(246, 180, 96, 0.22), transparent 55%),
        radial-gradient(900px 500px at 90% 85%, rgba(67, 142, 165, 0.2), transparent 60%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .paper {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: clamp(22px, 4vw, 40px);
      background: var(--card);
      backdrop-filter: blur(6px);
      box-shadow:
        0 24px 60px rgba(39, 59, 69, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      transform: translateY(10px);
      opacity: 0;
      animation: rise 650ms ease-out forwards;
      position: relative;
      overflow: hidden;
    }

    .paper::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: var(--accent-soft);
      pointer-events: none;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--subtle);
      background: rgba(255, 255, 255, 0.72);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px var(--accent-soft);
    }

    .title {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.12;
      letter-spacing: 0.4px;
      max-width: 18ch;
      text-wrap: balance;
    }

    .divider {
      margin: 24px 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(28, 45, 54, 0.34), rgba(28, 45, 54, 0.06));
    }

    .message {
      margin: 0;
      font-size: clamp(16px, 2.35vw, 22px);
      line-height: 1.6;
      color: #243840;
      word-break: break-word;
      min-height: 96px;
    }

    .message h1, .message h2, .message h3, .message h4, .message h5, .message h6 {
      margin-top: 1.2em;
      margin-bottom: 0.6em;
      color: var(--ink);
      font-family: "Fraunces", serif;
      line-height: 1.25;
    }
    .message p { margin-bottom: 1em; }
    .message p:last-child { margin-bottom: 0; }
    .message ul, .message ol { padding-left: 1.5em; margin-bottom: 1em; }
    .message li { margin-bottom: 0.5em; }
    .message blockquote {
      padding: 0 1em;
      color: var(--subtle);
      border-left: 0.25em solid var(--accent);
      background: var(--accent-soft);
      margin-bottom: 1em;
      border-radius: 4px;
    }
    .message code {
      padding: 0.2em 0.4em;
      font-size: 85%;
      background-color: var(--accent-soft);
      color: var(--ink);
      border-radius: 4px;
      font-family: monospace;
    }
    .message pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 1em;
    }
    .message pre code { background: none; padding: 0; }
    .message table {
      border-spacing: 0;
      border-collapse: collapse;
      margin-bottom: 1em;
      width: 100%;
    }
    .message table th, .message table td {
      padding: 8px 12px;
      border: 1px solid var(--line);
    }
    .message table th { background-color: var(--accent-soft); }
    .message a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
    .message a:hover { border-bottom-color: var(--accent); }

    .footer {
      margin-top: 28px;
      display: flex;
      justify-content: flex-end;
      color: var(--subtle);
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .date-chip {
      border: 1px dashed rgba(28, 45, 54, 0.28);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.56);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes rise {
      from {
        transform: translateY(12px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .date-chip {
        white-space: normal;
      }
    }
  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    #message {
      white-space: pre-wrap;
    }

    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  </style>
</head>

<body>
  <main class="paper" role="main" aria-live="polite">
    <div class="meta">
      <span class="badge"><span class="dot" aria-hidden="true"></span>WXPush 即时通知</span>
    </div>

    <h1 class="title" id="title">消息推送</h1>

    <div class="divider" aria-hidden="true"></div>

    <p class="message" id="message">无告警信息</p>

    <div class="footer">
      <div class="date-chip" id="date">无时间信息</div>
    </div>
  </main>

  <script>
    const query = new URLSearchParams(window.location.search);
    const title = query.get('title') || '消息推送';
    const message = query.get('message') || '无告警信息';
    const date = query.get('date') || '无时间信息';

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function copyText(element) {
        const text = element.textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('已复制: ' + text);
        }).catch(err => {
            showToast('复制失败');
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    function parseCustomMessage(value) {
        let safeValue = value.replace(/~n~/g, '\n');
        let escapedValue = escapeHTML(safeValue);
        return escapedValue.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
            return `<span class="copy-tag" onclick="copyText(this)" title="点击复制">${p1}</span>`;
        });
    }

    const pageTitleEl = document.getElementById('pageTitle');
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const dateEl = document.getElementById('date');

    if (pageTitleEl) pageTitleEl.textContent = title;
    if (titleEl) titleEl.textContent = title;
    if (messageEl) messageEl.innerHTML = parseCustomMessage(message);

    if (dateEl) {
        const rawDateText = dateEl.textContent || '';
        const datePrefix = rawDateText.includes('无时间信息') ? rawDateText.replace('无时间信息', '') : '';
        dateEl.textContent = `${datePrefix}${date}`;
    }
</script>
</body>

</html>
