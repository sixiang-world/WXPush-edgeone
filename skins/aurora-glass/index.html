<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">消息推送</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060f22;
      --panel: rgba(10, 18, 40, 0.72);
      --line: rgba(148, 185, 255, 0.26);
      --glow-a: #6ec0ff;
      --glow-b: #7bf2c4;
      --text: #eaf3ff;
      --sub: #a4bdd6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1400px 800px at 15% 120%, rgba(88, 153, 255, 0.24), transparent 55%),
        radial-gradient(900px 500px at 80% -10%, rgba(73, 227, 196, 0.2), transparent 56%),
        linear-gradient(160deg, #02040d 10%, #09152f 55%, #0c2040 100%);
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
      position: relative;
    }

    .aurora {
      position: fixed;
      inset: -30vmax;
      pointer-events: none;
      background:
        radial-gradient(circle at 25% 30%, rgba(110, 192, 255, 0.19), transparent 45%),
        radial-gradient(circle at 78% 70%, rgba(123, 242, 196, 0.17), transparent 44%);
      filter: blur(26px);
      animation: drift 14s ease-in-out infinite alternate;
      z-index: 0;
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(2px 2px at 20px 20px, rgba(255, 255, 255, 0.75), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(181, 214, 255, 0.64), transparent),
        radial-gradient(1.8px 1.8px at 280px 140px, rgba(167, 255, 235, 0.6), transparent);
      background-size: 320px 200px;
      animation: twinkle 9s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    .stars::before {
      transform: scale(1.25);
      opacity: 0.45;
      animation-duration: 13s;
    }

    .stars::after {
      transform: scale(1.5);
      opacity: 0.3;
      animation-duration: 18s;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(880px, 100%);
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      padding: clamp(22px, 4vw, 42px);
      box-shadow:
        0 30px 70px rgba(1, 5, 15, 0.66),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      animation: fade-up 650ms ease-out;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -120px auto auto -100px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110, 192, 255, 0.35), transparent 68%);
      pointer-events: none;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: #b4cdff;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .label::before {
      content: "";
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #b4cdff);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4.9vw, 50px);
      line-height: 1.15;
      font-weight: 700;
      text-wrap: balance;
      max-width: 16ch;
      text-shadow: 0 0 24px rgba(110, 192, 255, 0.2);
    }

    .message {
      margin: 26px 0 24px;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(134, 173, 233, 0.27);
      background: rgba(2, 8, 23, 0.54);
      font-size: clamp(16px, 2.3vw, 21px);
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      min-height: 110px;
    }
    .message th { background: rgba(110, 192, 255, 0.1); color: var(--glow-a); }

    .time {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--sub);
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .time::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow-b);
      box-shadow: 0 0 0 7px rgba(123, 242, 196, 0.14);
    }

    @keyframes drift {
      from {
        transform: translate3d(-4%, -2%, 0) scale(1);
      }

      to {
        transform: translate3d(4%, 2%, 0) scale(1.06);
      }
    }

    @keyframes twinkle {
      from {
        opacity: 0.35;
      }

      50% {
        opacity: 0.7;
      }

      to {
        opacity: 0.35;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .message {
        padding: 14px;
      }
    }
  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    #message {
      white-space: pre-wrap;
    }

    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  </style>
</head>

<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <article class="panel" role="main" aria-live="polite">
    <div class="label">Night Signal</div>
    <h1 id="title">消息推送</h1>
    <section class="message" id="message">无告警信息</section>
    <div class="time" id="date">无时间信息</div>
  </article>

  <script>
    const query = new URLSearchParams(window.location.search);
    const title = query.get('title') || '消息推送';
    const message = query.get('message') || '无告警信息';
    const date = query.get('date') || '无时间信息';

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function copyText(element) {
        const text = element.textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('已复制: ' + text);
        }).catch(err => {
            showToast('复制失败');
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    function parseCustomMessage(value) {
        let safeValue = value.replace(/~n~/g, '\n');
        let escapedValue = escapeHTML(safeValue);
        return escapedValue.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
            return `<span class="copy-tag" onclick="copyText(this)" title="点击复制">${p1}</span>`;
        });
    }

    const pageTitleEl = document.getElementById('pageTitle');
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const dateEl = document.getElementById('date');

    if (pageTitleEl) pageTitleEl.textContent = title;
    if (titleEl) titleEl.textContent = title;
    if (messageEl) messageEl.innerHTML = parseCustomMessage(message);

    if (dateEl) {
        const rawDateText = dateEl.textContent || '';
        const datePrefix = rawDateText.includes('无时间信息') ? rawDateText.replace('无时间信息', '') : '';
        dateEl.textContent = `${datePrefix}${date}`;
    }
</script>
</body>

</html>
