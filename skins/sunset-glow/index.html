<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">消息推送</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: rgba(255, 255, 255, 0.95);
      --text: #2d2d44;
      --muted: #6b6b8a;
      --accent: #ff6b35;
      --accent-soft: #ffb347;
      --accent-glow: rgba(255, 107, 53, 0.3);
      --border: rgba(255, 107, 53, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg,
        #1a1a2e 0%,
        #2d2d44 20%,
        #4a3f5c 40%,
        #8b5a7c 60%,
        #d4726a 80%,
        #ff8a5b 100%
      );
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    .sun-glow {
      position: fixed;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255, 200, 100, 0.8) 0%,
        rgba(255, 140, 80, 0.4) 30%,
        rgba(255, 100, 60, 0.1) 60%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
      animation: sun-pulse 4s ease-in-out infinite;
    }

    @keyframes sun-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.05); opacity: 0.9; }
    }

    .clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 180, 120, 0.15);
      border-radius: 100px;
      animation: cloud-float linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: inherit;
    }

    .cloud:nth-child(1) {
      top: 15%;
      left: -200px;
      width: 180px;
      height: 40px;
      animation-duration: 40s;
    }
    .cloud:nth-child(1)::before { width: 80px; height: 60px; top: -30px; left: 30px; }
    .cloud:nth-child(1)::after { width: 100px; height: 50px; top: -20px; left: 80px; }

    .cloud:nth-child(2) {
      top: 25%;
      left: -300px;
      width: 150px;
      height: 35px;
      animation-duration: 35s;
      animation-delay: 5s;
    }
    .cloud:nth-child(2)::before { width: 70px; height: 50px; top: -25px; left: 25px; }
    .cloud:nth-child(2)::after { width: 80px; height: 45px; top: -18px; left: 70px; }

    .cloud:nth-child(3) {
      top: 35%;
      left: -150px;
      width: 120px;
      height: 30px;
      animation-duration: 50s;
      animation-delay: 10s;
    }
    .cloud:nth-child(3)::before { width: 60px; height: 45px; top: -22px; left: 20px; }
    .cloud:nth-child(3)::after { width: 70px; height: 40px; top: -15px; left: 55px; }

    @keyframes cloud-float {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(100vw + 400px)); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(600px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 40px var(--accent-glow);
      overflow: hidden;
      animation: glow-in 0.6s ease-out;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-soft), var(--accent));
    }

    .header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .icon::after {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid white;
      border-radius: 50%;
    }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .body {
      padding: 28px 24px;
    }

    h1 {
      font-size: clamp(26px, 4.5vw, 38px);
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--text);
    }

    .message {
      background: linear-gradient(135deg,
        rgba(255, 107, 53, 0.06),
        rgba(255, 179, 71, 0.04)
      );
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      font-size: clamp(15px, 2vw, 17px);
      line-height: 1.6;
      word-break: break-word;
    }

    .message h1, .message h2, .message h3, .message h4, .message h5, .message h6 {
      margin-top: 1.2em;
      margin-bottom: 0.6em;
      color: var(--text);
      line-height: 1.25;
    }
    .message p { margin-bottom: 1em; }
    .message p:last-child { margin-bottom: 0; }
    .message ul, .message ol { padding-left: 1.5em; margin-bottom: 1em; }
    .message li { margin-bottom: 0.5em; }
    .message blockquote {
      padding: 0 1em;
      color: var(--muted);
      border-left: 0.25em solid var(--accent);
      background: rgba(255, 107, 53, 0.05);
      margin-bottom: 1em;
      border-radius: 4px;
    }
    .message code {
      padding: 0.2em 0.4em;
      font-size: 85%;
      background-color: var(--accent-soft);
      color: var(--text);
      border-radius: 4px;
      font-family: monospace;
    }
    .message pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1em;
    }
    .message pre code { background: none; padding: 0; }
    .message table {
      border-spacing: 0;
      border-collapse: collapse;
      margin-bottom: 1em;
      width: 100%;
    }
    .message table th, .message table td {
      padding: 8px 12px;
      border: 1px solid var(--border);
    }
    .message table th { background-color: var(--accent-soft); }
    .message a { color: var(--accent); text-decoration: none; }
    .message a:hover { text-decoration: underline; }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .time {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .time::before {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--accent-soft);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255, 179, 71, 0.2);
    }

    .tag {
      font-size: 12px;
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 179, 71, 0.08));
      border-radius: 999px;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    @keyframes glow-in {
      0% {
        opacity: 0;
        transform: translateY(16px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px var(--accent-glow);
      }
    }

    @media (max-width: 480px) {
      .body {
        padding: 24px 20px;
      }
      .header {
        padding: 16px 20px;
      }
    }
  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  
    #message {
      white-space: pre-wrap;
    }

    .copy-tag {
      background: rgba(128, 128, 128, 0.2);
      color: inherit;
      padding: 0px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(128, 128, 128, 0.5);
      transition: all 0.2s;
      display: inline-block;
      margin: 0 4px;
      font-weight: bold;
      text-decoration: underline;
    }
    .copy-tag:hover {
      background: rgba(128, 128, 128, 0.4);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(128, 128, 128, 0.3);
    }
    .copy-tag:active {
      transform: scale(0.95);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
      pointer-events: none;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

  </style>
</head>

<body>
  <div class="sun-glow" aria-hidden="true"></div>
  <div class="clouds" aria-hidden="true">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <main class="card" role="main" aria-live="polite">
    <div class="header">
      <div class="icon" aria-hidden="true"></div>
      <span class="label">夕阳推送</span>
    </div>

    <div class="body">
      <h1 id="title">消息推送</h1>
      <div class="message" id="message">无告警信息</div>
      <div class="footer">
        <span class="time" id="date">无时间信息</span>
        <span class="tag">已送达</span>
      </div>
    </div>
  </main>

  <script>
    const query = new URLSearchParams(window.location.search);
    const title = query.get('title') || '消息推送';
    const message = query.get('message') || '无告警信息';
    const date = query.get('date') || '无时间信息';

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function copyText(element) {
        const text = element.textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('已复制: ' + text);
        }).catch(err => {
            showToast('复制失败');
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    function parseCustomMessage(value) {
        let safeValue = value.replace(/~n~/g, '\n');
        let escapedValue = escapeHTML(safeValue);
        return escapedValue.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
            return `<span class="copy-tag" onclick="copyText(this)" title="点击复制">${p1}</span>`;
        });
    }

    const pageTitleEl = document.getElementById('pageTitle');
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const dateEl = document.getElementById('date');

    if (pageTitleEl) pageTitleEl.textContent = title;
    if (titleEl) titleEl.textContent = title;
    if (messageEl) messageEl.innerHTML = parseCustomMessage(message);

    if (dateEl) {
        const rawDateText = dateEl.textContent || '';
        const datePrefix = rawDateText.includes('无时间信息') ? rawDateText.replace('无时间信息', '') : '';
        dateEl.textContent = `${datePrefix}${date}`;
    }
</script>
</body>

</html>
